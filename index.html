    <meta charset="utf-8" />

    <title>初中英语单词练习测试机</title>
    <meta
      name="description"
      content="初中英语单词练习：随机出题，显示/隐藏答案，英汉互测。"
    />

    <link rel="manifest" href="manifest.webmanifest" />

    <script src="scripts/jquery-1.11.3.js" defer></script>
    <script src="./words_f.txt" defer></script>
    <script src="scripts/word_policy.js" defer></script>
    <script src="scripts/quiz_storage.js" defer></script>
    <script src="scripts/status.js" defer></script>
    <script src="./pwa.js" defer></script>
  </head>
  <body>
    <div id="header">
      <p>
        <span class="title-full">初中英语单词练习测试机</span>
        <span class="title-short" aria-hidden="true">初中英语单词测试</span>
      </p>
    </div>

    <div id="navigation" aria-label="导航">
      <ul>
        <li class="nav-primary"><a href="EtoC.html">看英文写中文</a></li>
        <li class="nav-primary"><a href="CtoE.html">看中文写英文</a></li>

        </li>
        <li class="nav-secondary">
          <a href="roots.html">水滴石穿</a>
        </li>
      </ul>
    </div>

    <div id="content" class="quiz-main-page">
      <div class="quiz-export-corner">
        <button type="button" id="btn-export-mastered">导出已掌握</button>
        <button type="button" id="btn-export-needle">导出难词库</button>
      </div>
      <div class="quiz-main-actions">
        <button id="btn1" type="button" onclick="getEnglishWords();">
          随机出题
        </button>
        <button
          id="btn2"
          type="button"
          onclick="showAnswer('chinese');"
          aria-controls="words-table"
        >
          <info text="no">显示答案</info>
        </button>
      </div>
      <p class="quiz-hint" style="display: none">
        可在答题框内输入答案，点击「显示答案」可查看参考答案，点击红灯将单词加入难词库，增加单词的练习频率，点击绿灯表示单词已完全掌握，无需再练习，再次点击取消操作。
      </p>
      <div class="quiz-light-legend" aria-label="标记说明" style="display: none">
        <span><i class="light-dot light-red"></i>红灯：难词库</span>
        <span><i class="light-dot light-green"></i>绿灯：已掌握</span>
        <span><i class="light-dot light-yellow"></i>黄灯：已标记，再点取消</span>
      </div>
      <table id="words-table">
        <tbody></tbody>
      </table>
    </div>
  </body>
