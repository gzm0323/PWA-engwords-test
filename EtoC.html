<body>
  <div id="header">
    <p>
      <span class="title-full">初中英语单词练习测试机</span>
      <span class="title-short" aria-hidden="true">初中英语单词测试</span>
    </p>
  </div>
  <div id="navigation">
    <ul>
      <li class="nav-primary"><a class="here" href="EtoC.html">看英文写中文</a></li>

      </li>
    </ul>

  <div id="content" class="quiz-main-page">
    <div class="account-strip" aria-label="账户设置">
      <span class="user-login-current">当前用户：<strong id="current-user-name">guest</strong></span>
      <button id="btn-account-toggle" type="button" aria-expanded="false" aria-controls="account-panel-body">
        账户设置
      </button>
    </div>
    <div id="account-panel-body" class="user-login-bar" hidden>
      <input id="login-user-input" type="text" maxlength="32" placeholder="输入用户名" />
      <input id="login-pin-input" type="password" maxlength="32" placeholder="输入PIN（至少4位）" />
      <button id="btn-login-user" type="button">登录/切换</button>
      <button id="btn-logout-user" type="button">登出锁定</button>
      <button id="btn-reset-user" type="button">忘记PIN重置</button>
    </div>
    <p class="quiz-hint">
      可在答题框内输入答案，点击「显示答案」可查看参考答案，点击红灯将单词加入难词库，增加单词的练习频率，点击绿灯表示单词已完全掌握，无需再随机出题，再次点击取消操作。
    </p>
    <div class="quiz-export-corner">
      <button type="button" id="btn-export-mastered">导出已掌握</button>
      <button type="button" id="btn-export-needle">导出难词库</button>
    </div>
    <div class="quiz-main-actions">
      <button id="btn1" onclick="getEnglishWords();">随机出题</button>
      <button id="btn2" onclick="showAnswer('chinese');"><info text="no">显示答案</info></button>
    </div>
    <div class="quiz-light-legend" aria-label="标记说明">
      <span><i class="light-dot light-red"></i>红灯：难词库</span>
      <span><i class="light-dot light-green"></i>绿灯：已掌握</span>
      <span><i class="light-dot light-yellow"></i>黄灯：已标记，再点取消</span>
    </div>
  <table id="words-table">
    </table>
  </div>
