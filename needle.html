    <div id="content" class="needle-page">
      <div class="account-strip" aria-label="账户设置">
        <span class="user-login-current">当前用户：<strong id="current-user-name">guest</strong></span>
        <button id="btn-account-toggle" type="button" aria-expanded="false" aria-controls="account-panel-body">
          账户设置
        </button>
      </div>
      <div id="account-panel-body" class="user-login-bar" hidden>
        <input id="login-user-input" type="text" maxlength="32" placeholder="输入用户名" />
        <input id="login-pin-input" type="password" maxlength="32" placeholder="输入PIN（至少4位）" />
        <button id="btn-login-user" type="button">登录/切换</button>
        <button id="btn-logout-user" type="button">登出锁定</button>
        <button id="btn-reset-user" type="button">忘记PIN重置</button>
      </div>
      <p class="needle-intro">
        本模块从<strong>初中英语词汇</strong>全库中，按<strong>难度算法</strong>自动筛选约
        <strong id="needle-pool-size">500</strong>
        个<strong>较难实词</strong>（优先字母较多、含常见拉丁/希腊词缀如
        <span lang="en">-tion、-ology、dis-、inter-</span>
        等），与通用题库区分，便于<strong>重点突破</strong>；你也可以在主练中手动加入难词到本题库。此页支持输入答案并点击「显示答案」仅查看标准答案，也可直接「移出难词库」。若忘记PIN，可点「忘记PIN重置」清空该用户记录后重建。<span id="needle-wrong-note" lang="zh-CN"></span>请选择题型后随机出题。
      </p>
      <div class="needle-actions">
        <button id="btn-needle-ec" type="button" onclick="getNeedleEnglishWords();">
          随机出题（看英文写中文）
        </button>
        <button id="btn-needle-ce" type="button" onclick="getNeedleChineseWords();">
          随机出题（看中文写英文）
        </button>
        <button
          id="btn2"
          type="button"
          onclick="showAnswerNeedle();"
          aria-controls="words-table"
        >
          <info text="no">显示答案</info>
        </button>
        <button type="button" id="btn-export-mastered">导出已掌握</button>
        <button type="button" id="btn-export-needle">导出难词库</button>

        <tbody></tbody>
      </table>
